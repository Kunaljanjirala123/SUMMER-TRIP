<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shared Itinerary — Travel Planner</title>
    <meta name="description" content="Shared travel itinerary view">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌴</text></svg>">
    <style>
        .shared-calendar {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            margin-bottom: 24px;
        }

        .shared-cal-header {
            text-align: center;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            padding: 8px 4px;
        }

        .shared-cal-day {
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-md);
            padding: 6px 4px;
            min-height: 70px;
            text-align: center;
            transition: all 0.2s;
        }

        .shared-cal-day.empty {
            background: transparent;
            border: none;
        }

        .shared-cal-day.has-event {
            border-color: var(--lavender-deep);
            background: linear-gradient(135deg, rgba(224, 214, 255, 0.3), rgba(255, 214, 224, 0.2));
        }

        .shared-cal-day .day-num {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .shared-cal-day .day-label {
            font-size: 0.65rem;
            color: var(--lavender-deep);
            font-weight: 600;
            margin-top: 4px;
            line-height: 1.2;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .shared-cal-day .day-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--lavender-deep);
            margin: 4px auto 0;
        }

        .month-nav-shared {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-bottom: 20px;
        }

        .month-nav-shared button {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 6px 14px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .month-nav-shared button:hover {
            background: var(--lavender);
        }

        .month-nav-shared h3 {
            font-size: 1.1rem;
            min-width: 180px;
            text-align: center;
        }

        .places-glance {
            margin-top: 20px;
        }

        .places-glance h3 {
            font-size: 1rem;
            margin-bottom: 12px;
            color: var(--text-primary);
        }

        .place-chip {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: linear-gradient(135deg, var(--lavender), var(--baby-blue));
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-primary);
            margin: 3px 4px;
        }

        .day-glance-card {
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            padding: 14px 18px;
            margin-bottom: 10px;
        }

        .day-glance-card h4 {
            font-size: 0.9rem;
            margin-bottom: 6px;
        }

        .day-glance-card .date-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 8px;
        }
    </style>
</head>

<body>

    <nav class="nav-bar">
        <a href="#" class="nav-logo" style="pointer-events: none;">
            <span class="logo-icon">🌴</span>
            <span>Shared Itinerary</span>
        </a>
    </nav>

    <div class="page-header">
        <h1 id="tripName">Loading...</h1>
        <p class="subtitle" id="tripDates"></p>
    </div>

    <div class="app-container">
        <div class="shared-banner" id="permBanner"></div>
        <div id="sharedContent"></div>
        <div id="errorState" class="empty-state" style="display: none;">
            <div class="empty-icon">🔗</div>
            <p>This share link is invalid or has expired.</p>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="/js/shared.js"></script>
</body>

</html>
